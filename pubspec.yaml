name: rms_offline
description: "Restaurant Management System - Offline First Flutter Desktop"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Database - Drift (SQLite ORM)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  dio: ^5.7.0

  # Connectivity
  connectivity_plus: ^6.1.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  crypto: ^3.0.5
  collection: ^1.19.1

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.21.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
